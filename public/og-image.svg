<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0C0C"/>
      <stop offset="100%" stop-color="#111620"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#D7E2EA" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#D7E2EA" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#D7E2EA" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#D7E2EA" stroke-width="0.5" opacity="0.04"/>

  <!-- Accent circle glow -->
  <circle cx="600" cy="315" r="260" fill="#D7E2EA" opacity="0.025"/>
  <circle cx="600" cy="315" r="180" fill="#D7E2EA" opacity="0.02"/>

  <!-- Label top -->
  <text x="600" y="160" font-family="Arial,sans-serif" font-size="14" font-weight="400" fill="#D7E2EA" opacity="0.35" text-anchor="middle" letter-spacing="6">PORTFOLIO · 2026</text>

  <!-- Main name -->
  <text x="600" y="300" font-family="Arial,sans-serif" font-size="80" font-weight="900" fill="#D7E2EA" text-anchor="middle" letter-spacing="-2">ROHAN DEVADIGA</text>

  <!-- Subtitle -->
  <text x="600" y="358" font-family="Arial,sans-serif" font-size="20" font-weight="300" fill="#D7E2EA" opacity="0.55" text-anchor="middle" letter-spacing="4">AI/ML RESEARCHER · BACKEND ENGINEER · MCA</text>

  <!-- University -->
  <text x="600" y="410" font-family="Arial,sans-serif" font-size="14" font-weight="400" fill="#D7E2EA" opacity="0.3" text-anchor="middle" letter-spacing="2">KLE TECHNOLOGICAL UNIVERSITY · HUBBALLI</text>

  <!-- Border frame -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="#D7E2EA" stroke-width="1" opacity="0.08"/>
