<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0C0C"/>
      <stop offset="100%" stop-color="#111418"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="52" fill="#141418"/>
  <circle cx="34" cy="26" r="12" fill="#00C9A7" opacity="0.9"/>
  <line x1="29" y1="26" x2="39" y2="26" stroke="#0C0C0C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="21" x2="34" y2="31" stroke="#0C0C0C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="56" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#D7E2EA" letter-spacing="1">MedMentor</text>
  <text x="680" y="32" font-family="Arial,sans-serif" font-size="11" fill="#00C9A7">● Live</text>
  <!-- Sidebar -->
  <rect x="0" y="52" width="200" height="548" fill="#0F1114"/>
  <rect x="12" y="72" width="176" height="38" rx="10" fill="#00C9A7" opacity="0.12"/>
  <text x="28" y="96" font-family="Arial,sans-serif" font-size="12" fill="#00C9A7">💬  Chat with AI</text>
  <text x="28" y="134" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA" opacity="0.5">📋  Patient Records</text>
  <text x="28" y="172" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA" opacity="0.5">💊  Drug Checker</text>
  <text x="28" y="210" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA" opacity="0.5">🧬  FHIR Data</text>
  <text x="28" y="248" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA" opacity="0.5">📊  Analytics</text>
  <!-- Divider -->
  <rect x="200" y="52" width="1" height="548" fill="#D7E2EA" opacity="0.08"/>
  <!-- Chat messages -->
  <text x="220" y="90" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.4" letter-spacing="1">HEALTHCARE AI ASSISTANT</text>
  <!-- User bubble -->
  <rect x="480" y="108" width="280" height="52" rx="16" fill="#1e2530"/>
  <text x="496" y="130" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA">What are the side effects of</text>
  <text x="496" y="148" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA">metformin for a diabetic patient?</text>
  <!-- AI bubble -->
  <rect x="220" y="178" width="340" height="80" rx="16" fill="#00C9A7" opacity="0.1"/>
  <rect x="220" y="178" width="340" height="80" rx="16" fill="none" stroke="#00C9A7" stroke-width="1" opacity="0.3"/>
  <text x="236" y="200" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#00C9A7">MedMentor AI</text>
  <text x="236" y="220" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.85">Common side effects include nausea,</text>
  <text x="236" y="238" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.85">diarrhea, and vitamin B12 deficiency...</text>
  <!-- Drug interaction card -->
  <rect x="220" y="278" width="560" height="70" rx="12" fill="#141418"/>
  <rect x="220" y="278" width="4" height="70" rx="2" fill="#00C9A7"/>
  <text x="236" y="300" font-family="Arial,sans-serif" font-size="11" fill="#00C9A7" font-weight="700">⚠ Drug Interaction Check — RxNorm API</text>
  <text x="236" y="320" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.7">Metformin + Lisinopril: No significant interaction found</text>
  <text x="236" y="338" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">Verified against 8,000+ drug database entries</text>
  <!-- FHIR badge -->
  <rect x="220" y="368" width="140" height="30" rx="8" fill="#00C9A7" opacity="0.12"/>
  <text x="236" y="388" font-family="Arial,sans-serif" font-size="11" fill="#00C9A7">FHIR R4 Compliant</text>
  <rect x="372" y="368" width="120" height="30" rx="8" fill="#00C9A7" opacity="0.08"/>
  <text x="388" y="388" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.6">Groq Llama 3.1</text>
  <!-- Input bar -->
  <rect x="220" y="540" width="560" height="44" rx="12" fill="#141418"/>
  <rect x="220" y="540" width="560" height="44" rx="12" fill="none" stroke="#D7E2EA" stroke-width="0.5" opacity="0.2"/>
  <text x="240" y="568" font-family="Arial,sans-serif" font-size="12" fill="#D7E2EA" opacity="0.3">Ask about symptoms, drugs, diagnoses...</text>
  <rect x="742" y="548" width="28" height="28" rx="8" fill="#00C9A7"/>
  <text x="753" y="566" font-family="Arial,sans-serif" font-size="14" fill="#0C0C0C" font-weight="900">↑</text>
</svg>