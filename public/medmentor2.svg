<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C0C0C"/>
      <stop offset="100%" stop-color="#0e1218"/>
    </linearGradient>
  </defs>
  <rect width="500" height="700" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="500" height="60" fill="#0F1114"/>
  <text x="20" y="36" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#D7E2EA">Symptom Analysis</text>
  <rect x="380" y="15" width="100" height="30" rx="8" fill="#00C9A7" opacity="0.15"/>
  <text x="398" y="35" font-family="Arial,sans-serif" font-size="11" fill="#00C9A7">New Report</text>
  <!-- Heading -->
  <text x="20" y="98" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.4" letter-spacing="2">DIFFERENTIAL DIAGNOSIS</text>
  <!-- Condition rows -->
  <!-- Row 1 -->
  <rect x="20" y="112" width="460" height="64" rx="12" fill="#141418"/>
  <rect x="20" y="112" width="4" height="64" rx="2" fill="#00C9A7"/>
  <text x="36" y="135" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#D7E2EA">Viral Pharyngitis</text>
  <text x="36" y="155" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">Sore throat, fever, fatigue — 3 matching symptoms</text>
  <text x="430" y="148" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#00C9A7">87%</text>
  <rect x="36" y="164" width="280" height="5" rx="2" fill="#D7E2EA" opacity="0.1"/>
  <rect x="36" y="164" width="244" height="5" rx="2" fill="#00C9A7" opacity="0.7"/>
  <!-- Row 2 -->
  <rect x="20" y="188" width="460" height="64" rx="12" fill="#141418"/>
  <rect x="20" y="188" width="4" height="64" rx="2" fill="#00C9A7" opacity="0.5"/>
  <text x="36" y="211" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#D7E2EA">Streptococcal Tonsillitis</text>
  <text x="36" y="231" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">Bacterial infection, white patches</text>
  <text x="430" y="224" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#00C9A7" opacity="0.7">62%</text>
  <rect x="36" y="240" width="280" height="5" rx="2" fill="#D7E2EA" opacity="0.1"/>
  <rect x="36" y="240" width="173" height="5" rx="2" fill="#00C9A7" opacity="0.5"/>
  <!-- Row 3 -->
  <rect x="20" y="264" width="460" height="64" rx="12" fill="#141418"/>
  <rect x="20" y="264" width="4" height="64" rx="2" fill="#D7E2EA" opacity="0.2"/>
  <text x="36" y="287" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#D7E2EA" opacity="0.7">Influenza Type A</text>
  <text x="36" y="307" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.4">Body aches, chills not confirmed</text>
  <text x="430" y="300" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#D7E2EA" opacity="0.4">34%</text>
  <rect x="36" y="316" width="280" height="5" rx="2" fill="#D7E2EA" opacity="0.1"/>
  <rect x="36" y="316" width="95" height="5" rx="2" fill="#D7E2EA" opacity="0.25"/>
  <!-- Vitals section -->
  <text x="20" y="362" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.4" letter-spacing="2">PATIENT VITALS</text>
  <rect x="20" y="374" width="140" height="80" rx="12" fill="#141418"/>
  <text x="36" y="400" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">Temperature</text>
  <text x="36" y="426" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#00C9A7">38.6°C</text>
  <rect x="170" y="374" width="140" height="80" rx="12" fill="#141418"/>
  <text x="186" y="400" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">Heart Rate</text>
  <text x="186" y="426" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#D7E2EA">92 bpm</text>
  <rect x="320" y="374" width="160" height="80" rx="12" fill="#141418"/>
  <text x="336" y="400" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">SpO2</text>
  <text x="336" y="426" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#D7E2EA">98%</text>
  <!-- MedMentor badge -->
  <rect x="20" y="480" width="460" height="50" rx="12" fill="#00C9A7" opacity="0.08"/>
  <rect x="20" y="480" width="460" height="50" rx="12" fill="none" stroke="#00C9A7" stroke-width="1" opacity="0.2"/>
  <text x="40" y="511" font-family="Arial,sans-serif" font-size="12" fill="#00C9A7">✦  Powered by Groq Llama 3.1 · FHIR R4 · MedMentor AI</text>
  <!-- Logo bottom -->
  <text x="200" y="650" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#D7E2EA" opacity="0.1" text-anchor="middle">MedMentor</text>
</svg>