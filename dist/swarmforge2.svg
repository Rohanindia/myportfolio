  <text x="336" y="483" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" opacity="0.4">Confidence</text>
  <text x="336" y="508" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#D7E2EA">94%</text>
