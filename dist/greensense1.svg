  <text x="518" y="388" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.5">Plant-based diet 2×/week</text>
  <text x="518" y="404" font-family="Arial,sans-serif" font-size="11" fill="#22C55E" opacity="0.5">saves 0.4 tons annually</text>
