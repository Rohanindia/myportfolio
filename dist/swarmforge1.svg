<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0C0C0C"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="52" fill="#0F1114"/>
  <rect x="16" y="16" width="20" height="20" rx="4" fill="#7C3AED" opacity="0.9"/>
  <text x="44" y="33" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#D7E2EA" letter-spacing="0.5">SwarmForge</text>
  <text x="560" y="30" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.4">Orchestration · Active</text>
  <rect x="720" y="12" width="64" height="28" rx="8" fill="#7C3AED" opacity="0.2"/>
  <text x="730" y="31" font-family="Arial,sans-serif" font-size="11" fill="#7C3AED">3 Agents</text>
  <!-- Main area label -->
  <text x="220" y="82" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" opacity="0.35" letter-spacing="2">AGENT TOPOLOGY</text>
  <!-- Connection lines first (behind nodes) -->
  <line x1="400" y1="200" x2="260" y2="320" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="200" x2="540" y2="320" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
  <line x1="260" y1="320" x2="400" y2="430" stroke="#7C3AED" stroke-width="1.2" opacity="0.25"/>
  <line x1="540" y1="320" x2="400" y2="430" stroke="#7C3AED" stroke-width="1.2" opacity="0.25"/>
  <!-- Glow circles -->
  <circle cx="400" cy="200" r="48" fill="#7C3AED" opacity="0.08"/>
  <circle cx="260" cy="320" r="40" fill="#7C3AED" opacity="0.06"/>
  <circle cx="540" cy="320" r="40" fill="#7C3AED" opacity="0.06"/>
  <circle cx="400" cy="430" r="36" fill="#7C3AED" opacity="0.05"/>
  <!-- Orchestrator node -->
  <circle cx="400" cy="200" r="36" fill="#141418" stroke="#7C3AED" stroke-width="2"/>
  <text x="400" y="196" font-family="Arial,sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle" font-weight="700">ORCHESTRATOR</text>
  <text x="400" y="210" font-family="Arial,sans-serif" font-size="9" fill="#D7E2EA" text-anchor="middle" opacity="0.5">Coordinator</text>
  <text x="400" y="248" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" text-anchor="middle" opacity="0.6">GovernedAgentHub</text>
  <!-- Research agent -->
  <circle cx="260" cy="320" r="30" fill="#141418" stroke="#7C3AED" stroke-width="1.5" opacity="0.8"/>
  <text x="260" y="316" font-family="Arial,sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle" font-weight="700">RESEARCH</text>
  <text x="260" y="328" font-family="Arial,sans-serif" font-size="8" fill="#D7E2EA" text-anchor="middle" opacity="0.5">Agent</text>
  <text x="260" y="362" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" text-anchor="middle" opacity="0.5">ResearchAgent</text>
  <!-- Analysis agent -->
  <circle cx="540" cy="320" r="30" fill="#141418" stroke="#7C3AED" stroke-width="1.5" opacity="0.8"/>
  <text x="540" y="316" font-family="Arial,sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle" font-weight="700">ANALYSIS</text>
  <text x="540" y="328" font-family="Arial,sans-serif" font-size="8" fill="#D7E2EA" text-anchor="middle" opacity="0.5">Agent</text>
  <text x="540" y="362" font-family="Arial,sans-serif" font-size="11" fill="#D7E2EA" text-anchor="middle" opacity="0.5">AnalysisAgent</text>
  <!-- Decision node -->
  <circle cx="400" cy="430" r="26" fill="#141418" stroke="#7C3AED" stroke-width="1.2" opacity="0.6"/>
  <text x="400" y="427" font-family="Arial,sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle">DECISION</text>
  <text x="400" y="439" font-family="Arial,sans-serif" font-size="8" fill="#D7E2EA" text-anchor="middle" opacity="0.5">Agent</text>
  <!-- Sidebar activity log -->
  <rect x="620" y="64" width="160" height="240" rx="12" fill="#141418"/>
  <text x="636" y="88" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" opacity="0.4" letter-spacing="1">AGENT LOG</text>
  <circle cx="640" cy="110" r="3" fill="#7C3AED"/>
  <text x="652" y="114" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" opacity="0.7">Orchestrator ready</text>
  <circle cx="640" cy="134" r="3" fill="#7C3AED" opacity="0.7"/>
  <text x="652" y="138" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" opacity="0.6">Research: fetching</text>
  <circle cx="640" cy="158" r="3" fill="#7C3AED" opacity="0.5"/>
  <text x="652" y="162" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" opacity="0.5">Analysis: processing</text>
  <circle cx="640" cy="182" r="3" fill="#D7E2EA" opacity="0.2"/>
  <text x="652" y="186" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" opacity="0.3">Decision: waiting</text>
  <!-- Status badge -->
  <rect x="620" y="480" width="160" height="60" rx="12" fill="#7C3AED" opacity="0.1"/>
  <rect x="620" y="480" width="160" height="60" rx="12" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>
  <text x="700" y="506" font-family="Arial,sans-serif" font-size="11" fill="#7C3AED" text-anchor="middle" font-weight="700">Swarm Active</text>
  <text x="700" y="524" font-family="Arial,sans-serif" font-size="10" fill="#D7E2EA" text-anchor="middle" opacity="0.4">3/3 agents running</text>
</svg>